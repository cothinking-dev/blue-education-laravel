                                - paragraph [ref=e149]:
                                  - generic [ref=e153]: They even went as far as to arrange a home stay for me and plan out the smoothest course for my next few years of study. I am especially grateful to Sonia and Monica who made my transition to Australia extremely easy. Since then, I head to them with any queries regarding my studies or any difficulties I’m facing in Australia. I highly recommend BLUE education for their professionalism and dedication.
                        - listitem [ref=e154]:
                          - generic [ref=e155]:
