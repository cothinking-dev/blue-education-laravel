                                  - generic [ref=e197]: Bachelor of Nursing
                                - paragraph [ref=e198]:
                                  - generic [ref=e203]:
                                    - text: My first experience with Blue Education Migration was in 2017 when I was renewing my visa for the first time in Australia. I experienced the most organised service. Everything was done in order and in a timely manner as I am a person who worries a lot when it comes to visa. Since then, I have never thought otherwise. Anytime I want any information to do with the best university and best course I have always approached the team. ...oh, did I forget that they also keep checking on you throughout to see how you are doing and whether you are having any issues with studies. I mean the support is just extraordinary. They make you feel cared for and that there is actually someone who is ready to advocate for you in case there is any issues.
                                    - text: Sonia and Monica are very professional and caring at the same time. I have worked with them ever since and every time I need them the service is always the best.
                                    - text: Blue education migration with the help of Sonia and Monica specifically have made my dream of being a Registered Nurse come true. I am not yet fully there but I am sure I will definitely get there. Thank you Blue Education Migration!!
