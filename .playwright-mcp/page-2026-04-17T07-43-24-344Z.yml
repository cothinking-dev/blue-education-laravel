                                  - generic [ref=e172]: Masters of Public Health
                                - paragraph [ref=e173]:
                                  - generic [ref=e177]: Where would I be without the team at Blue Education? They have helped me so much through my time in Perth, that they are now like family. They are always there for me to help with whatever I need, to reassure me that everything will be okay... as they all I know I love to worry. I was feeling hopeless when I had decided to stop my studies at UWA as I didn’t think that path was right for me at the time. I found Blue Education and they found time for that day, after I called, to have me meet them in their office. It was a sigh of relief. All the staff there are so kind, professional, and will do anything in their power to help you succeed. Thank you so much for your kind faces, dedication, and support. Perth is home because of them. You’re in good hands with Blue Education.
                        - listitem [ref=e178]:
                          - generic [ref=e179]:
                            - generic:
                              - generic:
